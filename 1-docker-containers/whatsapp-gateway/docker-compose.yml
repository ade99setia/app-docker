services:
  # ==========================================
  # 1. EVOLUTION API (Core Mesin WA)
  # ==========================================
  evolution_api:
    container_name: evolution_api
    image: evoapicloud/evolution-api:latest
    restart: always
    depends_on:
      - redis
      - evolution_db
    ports:
      - "8080:8080"
    volumes:
      - evolution_instances:/evolution/instances
    networks:
      - evolution-net
      - shared_web_network
    environment:
      - SERVER_URL=http://localhost:8080
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=KunciRahasiaSaya999
      
      # Konfigurasi Database ke PostgreSQL
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://wa_user:rahasiaWA123@evolution_db:5432/evolution_wa_db?schema=public
      
      # Konfigurasi Cache ke Redis
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://redis:6379
      
      # Opsi Penyimpanan Data
      - DATABASE_SAVE_DATA_CONTACTS=true
      - DATABASE_SAVE_DATA_CHATS=true
      - DATABASE_SAVE_DATA_MESSAGES=true

  # ==========================================
  # 2. REDIS (Untuk Cache Antrean Pesan)
  # ==========================================
  redis:
    container_name: evolution_redis
    image: redis:latest
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - evolution_redis:/data
    networks:
      - evolution-net
      - shared_web_network

  # ==========================================
  # 3. POSTGRESQL (Lebih Stabil untuk Evolution)
  # ==========================================
  evolution_db:
    container_name: evolution_db
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: wa_user
      POSTGRES_PASSWORD: rahasiaWA123
      POSTGRES_DB: evolution_wa_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - evolution-net
      - shared_web_network

# ==========================================
# Volumes & Networks
# ==========================================
volumes:
  evolution_instances:
  evolution_redis:
  postgres_data: # Ganti dari mysql_data

networks:
  evolution-net:
    driver: bridge
  shared_web_network:
    external: true