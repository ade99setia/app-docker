services:
  # =========================
  # App: PHP-FPM CI4
  # =========================
  app_undangan_pernikahan:
    image: ghcr.io/ade99setia/undangan_pernikahan_app:latest
    container_name: undangan_pernikahan_app
    env_file:
      - .env
    volumes:
      - public_app:/var/www/html/public 
      - data_private:/var/www/html/private
      - data_writable:/var/www/html/writable 
    networks:
      - undangan_pernikahan_network
    restart: unless-stopped

  # =========================
  # Web: Nginx
  # =========================
  web_undangan_pernikahan:
    image: nginx:alpine
    container_name: undangan_pernikahan_web
    ports:
      - "8082:80"
    volumes:
      - ./default.conf:/etc/nginx/conf.d/default.conf:ro      
      - public_app:/var/www/html/public:ro 
      - data_private:/var/www/html/private:ro
      - data_writable:/var/www/html/writable:ro
    depends_on:
      - app_undangan_pernikahan
    networks:
      - undangan_pernikahan_network
      - shared_web_network
    restart: unless-stopped

  # =========================
  # Database: MySQL
  # =========================
  db_undangan_pernikahan:
    image: mysql:8.0
    container_name: undangan_pernikahan_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: undangan_pernikahan
      MYSQL_USER: ci4_user
      MYSQL_PASSWORD: secret
    ports:
      - "3307:3306"
    volumes:
      - data_db:/var/lib/mysql:rw
    networks:
      - undangan_pernikahan_network
    restart: unless-stopped

# =========================
# Networks & Volumes
# =========================
networks:
  undangan_pernikahan_network:
    driver: bridge
  shared_web_network:
    external: true

volumes:
  public_app:
  data_writable:
  data_private:
  data_db: